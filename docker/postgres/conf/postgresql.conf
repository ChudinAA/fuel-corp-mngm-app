# PostgreSQL конфигурация для production
# Оптимизирована под выделенный сервер с 4-8 ГБ RAM

# ─── Подключения ─────────────────────────────────────────────────────────────
max_connections = 100
# Для подключения только с конкретных хостов — настройте pg_hba.conf

# ─── Память ──────────────────────────────────────────────────────────────────
shared_buffers = 1GB               # 25% от RAM сервера
effective_cache_size = 3GB         # 75% от RAM сервера  
work_mem = 32MB                    # для сортировок и join'ов
maintenance_work_mem = 512MB       # для VACUUM, CREATE INDEX

# ─── WAL (Write-Ahead Log) ───────────────────────────────────────────────────
wal_buffers = 64MB
checkpoint_completion_target = 0.9
max_wal_size = 2GB
min_wal_size = 256MB
wal_level = replica                # нужен для pg_basebackup и репликации

# ─── Запросы ─────────────────────────────────────────────────────────────────
random_page_cost = 1.1             # для SSD; 4.0 для HDD
effective_io_concurrency = 200     # для SSD; 2 для HDD
default_statistics_target = 100

# ─── Логирование ─────────────────────────────────────────────────────────────
log_timezone = 'Europe/Moscow'
log_min_duration_statement = 1000  # логировать запросы медленнее 1 секунды
log_checkpoints = on
log_connections = on
log_disconnections = on
log_lock_waits = on
log_temp_files = 0

# ─── Часовой пояс ────────────────────────────────────────────────────────────
timezone = 'Europe/Moscow'
datestyle = 'iso, mdy'
lc_messages = 'en_US.UTF-8'

# ─── Autovacuum (важно для audit_log и других быстрорастущих таблиц) ─────────
autovacuum = on
autovacuum_max_workers = 4
autovacuum_naptime = 1min
autovacuum_vacuum_scale_factor = 0.05    # триггер вакуума при изменении 5% строк
autovacuum_analyze_scale_factor = 0.02

# ─── Параллелизм ─────────────────────────────────────────────────────────────
max_worker_processes = 8
max_parallel_workers_per_gather = 4
max_parallel_workers = 8
max_parallel_maintenance_workers = 4

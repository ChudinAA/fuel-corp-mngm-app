################################################################################
# Nginx конфигурация для Aviation Fuel Management System
# Установка:
#   sudo cp docker/nginx/nginx.conf /etc/nginx/sites-available/avfuel
#   sudo ln -sf /etc/nginx/sites-available/avfuel /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
################################################################################

# HTTP → HTTPS редирект
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN_HERE;  # <-- замените на ваш домен

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS сервер
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name YOUR_DOMAIN_HERE;  # <-- замените на ваш домен

    # SSL сертификаты (Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN_HERE/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN_HERE/privkey.pem;

    # Современные SSL настройки
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Размер загружаемых файлов (для Excel-экспортов)
    client_max_body_size 50M;

    # Таймауты (важно для SSE - Server-Sent Events)
    proxy_read_timeout  3600s;
    proxy_send_timeout  3600s;
    proxy_connect_timeout 30s;

    # Основной прокси
    location / {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Отключаем буферизацию для SSE (/api/events)
        proxy_buffering off;
    }

    # Статические файлы — кеширование
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://127.0.0.1:5000;
        proxy_cache_bypass $http_upgrade;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Health check (можно не проксировать через nginx, если нужен прямой доступ)
    location /api/health {
        proxy_pass http://127.0.0.1:5000;
        access_log off;
    }
}
